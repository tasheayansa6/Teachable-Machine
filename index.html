<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Teachable Machine Clone</title>
  <link rel="stylesheet" href="assets/styles/style.css" />
</head>
<body>
  <header>
    <h1>🧠 Teachable Machine</h1>
    <p>Train a real image classifier in your browser — no code, no server.</p>
    <button id="demo-btn" class="btn btn-demo">⚡ Load Demo</button>
  </header>

  <main>
    <!-- How it works banner -->
    <div class="how-it-works">
      <div class="step"><span class="step-num">1</span><span>Add classes &amp; upload images</span></div>
      <div class="step-arrow">→</div>
      <div class="step"><span class="step-num">2</span><span>Train the model</span></div>
      <div class="step-arrow">→</div>
      <div class="step"><span class="step-num">3</span><span>Predict new images</span></div>
    </div>

    <!-- Classes Section -->
    <section id="classes-section">
      <div id="classes-container"></div>
      <button id="add-class-btn" class="btn btn-secondary">+ Add Class</button>
    </section>

    <!-- Train Section -->
    <section id="train-section">
      <button id="train-btn" class="btn btn-primary" disabled>Train Model</button>
      <div id="train-status"></div>
      <div id="progress-bar-container" style="display:none">
        <div id="progress-bar"></div>
        <span id="progress-label">0%</span>
      </div>
    </section>

    <!-- Predict Section -->
    <section id="predict-section" style="display:none">
      <h2>Make a Prediction</h2>
      <div id="predict-upload-area" class="upload-area">
        <p>Drag &amp; drop or click to upload an image to classify</p>
        <input type="file" id="predict-input" accept="image/*" />
        <label for="predict-input" class="btn btn-primary">Choose Image</label>
      </div>
      <div id="demo-predict-btns" style="display:none; margin-top:12px; gap:8px; flex-wrap:wrap;"></div>
      <div id="predict-preview-container" style="display:none">
        <img id="predict-preview" alt="Prediction preview" />
        <div id="results-container"></div>
      </div>
    </section>
  </main>

  <!-- Class Card Template -->
  <template id="class-card-template">
    <div class="class-card">
      <div class="class-header">
        <input type="text" class="class-name-input" placeholder="Class Name" />
        <button class="remove-class-btn btn btn-danger">✕</button>
      </div>
      <div class="upload-area class-upload-area">
        <p>Drag &amp; drop images or click to upload</p>
        <input type="file" class="class-file-input" accept="image/*" multiple />
        <label class="btn btn-secondary">Choose Images</label>
      </div>
      <div class="image-count">0 images</div>
      <div class="thumbnail-grid"></div>
    </div>
  </template>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.0/dist/mobilenet.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/demo.js"></script>
  <script src="js/data.js"></script>
  <script src="js/model.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
